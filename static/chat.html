<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flow Chatt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-deep: #0a0c10;
  --bg-surface: #12151a;
  --bg-elevated: #1a1e26;
  --border: #252a35;
  --accent: #4f8ff7;
  --green: #34d399;
  --red: #f87171;
  --amber: #fbbf24;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #505a6e;
  --font-ui: "DM Sans", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", monospace;
}
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-ui);
  height: 100vh; height: 100dvh;
  display: flex;
}

/* Sidebar */
#sidebar {
  width: 240px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  background: var(--bg-surface);
}
#sidebar h2 {
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-muted); padding: 16px 16px 8px;
}
.channel-list { flex: 1; overflow-y: auto; padding: 0 8px; }
.ch-row {
  display: flex; align-items: center; padding: 6px 10px;
  font-family: var(--font-mono); font-size: 13px;
  color: var(--text-secondary); cursor: pointer; border-radius: 4px; margin-bottom: 2px;
}
.ch-row:hover { background: var(--bg-elevated); }
.ch-row.active { background: var(--bg-elevated); color: var(--accent); border-left: 2px solid var(--accent); }
.ch-row .hash { color: var(--text-muted); margin-right: 4px; }
.ch-row .ch-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ch-row .ch-del { display: none; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 3px; }
.ch-row:hover .ch-del { display: block; }
.ch-row .ch-del:hover { color: var(--red); background: var(--bg-deep); }

#new-channel-btn {
  margin: 8px; padding: 8px; background: none;
  border: 1px dashed var(--border); border-radius: 4px;
  color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; cursor: pointer;
}
#new-channel-btn:hover { border-color: var(--accent); color: var(--accent); }

#conn-info {
  padding: 10px 14px; font-family: var(--font-mono); font-size: 10px;
  color: var(--text-muted); border-top: 1px solid var(--border);
}
#conn-info .dot { color: var(--green); }
#conn-info .user-name { color: var(--accent); cursor: pointer; }
#conn-info .user-name:hover { text-decoration: underline; }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#chat-header {
  padding: 10px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; background: var(--bg-surface);
}
#chat-header h1 { font-family: var(--font-mono); font-size: 15px; font-weight: 500; }
#chat-header .topic { font-size: 12px; color: var(--text-muted); flex: 1; }

/* Messages */
#messages {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 2px;
}
.msg {
  font-family: var(--font-mono); font-size: 13px; line-height: 1.6;
  padding: 3px 8px; border-radius: 4px;
}
.msg:hover { background: var(--bg-surface); }
.msg .time { color: var(--text-muted); font-size: 11px; margin-right: 8px; }
.msg .author { font-weight: 500; margin-right: 8px; }
.msg.role-user .author { color: var(--accent); }
.msg.role-self .author { color: var(--green); }
.msg.role-system .author { color: var(--amber); }
.msg .content { color: var(--text-primary); word-break: break-word; }
.msg .content code { background: var(--bg-elevated); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
.msg-system {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-muted); font-style: italic; padding: 8px;
}
.msg-day {
  text-align: center; font-family: var(--font-mono); font-size: 10px;
  color: var(--text-muted); padding: 12px 0 4px;
  letter-spacing: 1px; text-transform: uppercase;
}

/* Attachments */
.msg-images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.msg-images img {
  max-width: 360px; max-height: 260px; border-radius: 8px;
  cursor: pointer; object-fit: cover; border: 1px solid var(--border);
}
.msg-images img:hover { border-color: var(--accent); }

/* Attachment preview strip */
#attach-preview {
  padding: 0 20px; background: var(--bg-surface); display: none;
  gap: 8px; flex-wrap: wrap;
}
#attach-preview.has-files { display: flex; padding-top: 8px; }
.ap-thumb {
  position: relative; width: 64px; height: 64px; border-radius: 6px;
  overflow: hidden; border: 1px solid var(--border); background: var(--bg-elevated);
}
.ap-thumb img { width: 100%; height: 100%; object-fit: cover; }
.ap-rm {
  position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7);
  border: none; color: var(--red); font-size: 14px; cursor: pointer;
  border-radius: 50%; width: 18px; height: 18px; line-height: 18px; text-align: center;
}
.ap-rm:hover { background: var(--red); color: #000; }

/* Lightbox */
#lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 999; align-items: center; justify-content: center; cursor: pointer;
}
#lightbox.on { display: flex; }
#lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }

/* Input area */
#input-area {
  padding: 12px 20px; border-top: 1px solid var(--border);
  background: var(--bg-surface); display: flex; gap: 8px; align-items: flex-end;
}
#attach-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--text-muted); padding: 9px 10px; cursor: pointer; font-size: 16px;
  line-height: 1;
}
#attach-btn:hover { color: var(--accent); border-color: var(--accent); }
#msg-input {
  flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); font-family: var(--font-mono);
  font-size: 13px; padding: 10px 14px; resize: none; outline: none;
  min-height: 42px; max-height: 120px;
}
#msg-input:focus { border-color: var(--accent); }
#msg-input::placeholder { color: var(--text-muted); }
#send-btn {
  background: var(--accent); border: none; border-radius: 8px; color: #000;
  font-family: var(--font-mono); font-weight: 600; font-size: 12px;
  padding: 10px 18px; cursor: pointer; white-space: nowrap;
}
#send-btn:hover { opacity: 0.85; }

/* Drag overlay */
#drop-overlay {
  display: none; position: fixed; inset: 0; background: rgba(79,143,247,0.1);
  border: 3px dashed var(--accent); z-index: 100;
  align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 18px; color: var(--accent);
}
#drop-overlay.show { display: flex; }

/* Mobile */
@media (max-width: 640px) {
  #sidebar { width: 60px; }
  #sidebar h2 { display: none; }
  .ch-row .ch-name { font-size: 10px; }
  .ch-row .ch-del { display: none !important; }
  #new-channel-btn { font-size: 16px; text-align: center; }
  #conn-info { font-size: 8px; }
  #messages { padding: 8px; }
  .msg { font-size: 12px; }
  .msg-images img { max-width: 200px; max-height: 160px; }
  #chat-header h1 { font-size: 13px; }
}
</style>
</head>
<body>

<div id="sidebar">
  <h2>Channels</h2>
  <div class="channel-list" id="channel-list"></div>
  <button id="new-channel-btn" onclick="newChannel()">+ Ny kanal</button>
  <div id="conn-info">
    <span class="dot">&#9679;</span>
    <span class="user-name" id="user-display" onclick="changeName()" title="Klicka for att byta namn"></span>
  </div>
</div>

<div id="main">
  <div id="chat-header">
    <h1 id="header-name"># general</h1>
    <div class="topic" id="header-topic"></div>
  </div>
  <div id="messages"></div>
  <div id="attach-preview"></div>
  <div id="input-area">
    <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Bifoga bild">&#128206;</button>
    <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="onFiles(this.files)">
    <textarea id="msg-input" placeholder="Skriv ett meddelande..." rows="1"
      onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="send()">Skicka</button>
  </div>
</div>

<div id="lightbox" onclick="this.classList.remove('on')"><img id="lb-img"></div>
<div id="drop-overlay">Slapp bilden har</div>

<script>
// === State ===
let currentChannel = 'general';
let username = localStorage.getItem('cortex-chat-user') || '';
let eventSource = null;
const seenIds = new Set();
let lastDateShown = '';
let pendingFiles = []; // [{dataUrl, name, size}]

// === Init ===
async function init() {
  if (!username) {
    username = prompt('Vad vill du heta i chatten?', '') || 'anon-' + Math.random().toString(36).slice(2, 6);
    localStorage.setItem('cortex-chat-user', username);
  }
  document.getElementById('user-display').textContent = username;

  const params = new URLSearchParams(location.search);
  if (params.get('channel')) currentChannel = params.get('channel');

  await loadChannels();
  switchChannel(currentChannel);
  setupDragDrop();
}

function changeName() {
  const n = prompt('Nytt namn:', username);
  if (n && n.trim()) {
    username = n.trim();
    localStorage.setItem('cortex-chat-user', username);
    document.getElementById('user-display').textContent = username;
  }
}

// === Channels ===
async function loadChannels() {
  try {
    const data = await fetch('/api/channels').then(r => r.json());
    const list = document.getElementById('channel-list');
    const channels = data.channels || [];
    list.innerHTML = channels.map(c => {
      const active = c.name === currentChannel ? ' active' : '';
      const del = c.name !== 'general'
        ? `<button class="ch-del" onclick="event.stopPropagation();delChannel('${esc(c.name)}')" title="Ta bort">&#215;</button>`
        : '';
      return `<div class="ch-row${active}" onclick="switchChannel('${esc(c.name)}')">
        <span class="hash">#</span>
        <span class="ch-name">${esc(c.display_name || c.name)}</span>
        ${del}
      </div>`;
    }).join('');
  } catch(e) {}
}

async function switchChannel(name) {
  currentChannel = name;
  lastDateShown = '';
  document.getElementById('header-name').textContent = '# ' + name;
  document.querySelectorAll('.ch-row').forEach(el => {
    const n = el.querySelector('.ch-name');
    el.classList.toggle('active', n && n.textContent === name);
  });
  history.replaceState(null, '', '?channel=' + name);
  await loadMessages(name);
  connectSSE();
  document.getElementById('msg-input').focus();
}

async function newChannel() {
  const name = prompt('Kanalnamn:');
  if (!name || !name.trim()) return;
  const clean = name.trim().toLowerCase().replace(/[^a-z0-9\u00e5\u00e4\u00f6-]/g, '-').replace(/-+/g, '-');
  await fetch('/api/channel', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: clean, display_name: name.trim(), created_by: username }),
  });
  await loadChannels();
  switchChannel(clean);
}

async function delChannel(name) {
  if (!confirm('Ta bort #' + name + '?')) return;
  await fetch('/api/channel/' + name, { method: 'DELETE' });
  if (currentChannel === name) currentChannel = 'general';
  await loadChannels();
  switchChannel(currentChannel);
}

// === Messages ===
async function loadMessages(channel) {
  const el = document.getElementById('messages');
  el.innerHTML = '';
  seenIds.clear();
  lastDateShown = '';
  try {
    const data = await fetch('/api/channel/' + channel + '/messages?limit=200').then(r => r.json());
    const msgs = (data.messages || []).reverse();
    if (msgs.length === 0) {
      el.innerHTML = '<div class="msg-system">Inga meddelanden. Skriv nagot!</div>';
    } else {
      msgs.forEach(m => {
        seenIds.add(m.id);
        addDateSeparator(m.created_at);
        appendMsg(m.author, m.content, m.author === username ? 'self' : 'user', m.created_at, m.attachments || []);
      });
    }
  } catch(e) {
    el.innerHTML = '<div class="msg-system">Kunde inte ladda meddelanden</div>';
  }
  scrollBottom();
}

function addDateSeparator(ts) {
  if (!ts) return;
  const day = ts.substring(0, 10);
  if (day !== lastDateShown) {
    lastDateShown = day;
    const el = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg-day';
    const d = new Date(ts);
    div.textContent = d.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
    el.appendChild(div);
  }
}

function appendMsg(author, content, role, timestamp, attachments) {
  const el = document.getElementById('messages');
  const time = timestamp ? timestamp.substring(11, 16) : '';
  const div = document.createElement('div');
  div.className = 'msg role-' + role;

  let html = `<span class="time">${time}</span><span class="author">${esc(author)}</span>`;
  if (content && content !== '[bild]' && !content.match(/^\[\d+ bilder\]$/)) {
    html += `<span class="content">${fmtContent(content)}</span>`;
  }
  div.innerHTML = html;

  // Render attachments
  if (attachments && attachments.length) {
    const imgWrap = document.createElement('div');
    imgWrap.className = 'msg-images';
    attachments.forEach(a => {
      if (a.dataUrl && a.dataUrl.startsWith('data:image')) {
        const img = document.createElement('img');
        img.src = a.dataUrl;
        img.loading = 'lazy';
        img.alt = a.name || 'bild';
        img.onclick = () => openLightbox(a.dataUrl);
        imgWrap.appendChild(img);
      }
    });
    if (imgWrap.children.length) div.appendChild(imgWrap);
  }

  el.appendChild(div);
}

function appendSystem(text) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  el.appendChild(div);
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('on');
}

// === SSE ===
function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/api/events');
  eventSource.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.event_type !== 'chat_message') return;
      if (d.channel !== currentChannel) return;
      if (d.id && seenIds.has(d.id)) return;
      if (d.author === username && Date.now() - (window._lastSend || 0) < 3000) return;
      if (d.id) seenIds.add(d.id);
      addDateSeparator(d.created_at);
      appendMsg(d.author || 'unknown', d.content || '', 'user', d.created_at, d.attachments || []);
      scrollBottom();
      if (document.hidden && Notification.permission === 'granted') {
        new Notification(d.author + ' i #' + d.channel, { body: (d.content || '').substring(0, 100) });
      }
    } catch(err) {}
  };
  eventSource.onerror = () => console.log('SSE reconnecting...');
}

// === Files / Images ===
function onFiles(fileList) {
  for (const file of fileList) {
    if (!file.type.startsWith('image/')) continue;
    if (file.size > 5 * 1024 * 1024) {
      appendSystem('Bilden ' + file.name + ' ar for stor (max 5MB)');
      continue;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      pendingFiles.push({ dataUrl: e.target.result, name: file.name, size: file.size });
      renderPreview();
    };
    reader.readAsDataURL(file);
  }
  document.getElementById('file-input').value = '';
}

function renderPreview() {
  const el = document.getElementById('attach-preview');
  el.classList.toggle('has-files', pendingFiles.length > 0);
  el.innerHTML = pendingFiles.map((f, i) =>
    `<div class="ap-thumb">
      <img src="${f.dataUrl}">
      <button class="ap-rm" onclick="removePending(${i})">x</button>
    </div>`
  ).join('');
}

function removePending(i) {
  pendingFiles.splice(i, 1);
  renderPreview();
}

// Paste images
document.addEventListener('paste', (e) => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) onFiles([file]);
    }
  }
});

// Drag & drop
function setupDragDrop() {
  const overlay = document.getElementById('drop-overlay');
  let dragCount = 0;

  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCount++;
    if (e.dataTransfer.types.includes('Files')) overlay.classList.add('show');
  });
  document.addEventListener('dragleave', (e) => {
    dragCount--;
    if (dragCount <= 0) { overlay.classList.remove('show'); dragCount = 0; }
  });
  document.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    overlay.classList.remove('show');
    dragCount = 0;
    if (e.dataTransfer.files.length) onFiles(e.dataTransfer.files);
  });
}

// === Send ===
async function send() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !pendingFiles.length) return;
  input.value = '';
  input.style.height = 'auto';
  window._lastSend = Date.now();

  const attachments = pendingFiles.map(f => ({ dataUrl: f.dataUrl, name: f.name, size: f.size }));
  pendingFiles = [];
  renderPreview();

  // Optimistic render
  addDateSeparator(new Date().toISOString());
  appendMsg(username, text || '', 'self', new Date().toISOString(), attachments);
  scrollBottom();

  try {
    const res = await fetch('/api/channel/' + currentChannel + '/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content: text,
        author: username,
        attachments: attachments.length ? attachments : undefined,
      }),
    }).then(r => r.json());
    if (res.id) seenIds.add(res.id);
    if (!res.ok) appendSystem('Fel: ' + (res.error || 'unknown'));
  } catch(e) {
    appendSystem('Kunde inte skicka: ' + e.message);
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

// Auto-resize textarea
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// === Helpers ===
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function fmtContent(s) {
  if (!s) return '';
  let h = esc(s);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
  return h;
}

init();
</script>
</body>
</html>
